services:
  postgres:
    image: postgres:16-alpine
    container_name: productse-postgres
    environment:
      POSTGRES_DB: productse
      POSTGRES_USER: productse
      POSTGRES_PASSWORD: productse
    ports:
      - "5432:5432"
    volumes:
      - productse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productse -d productse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  productse_postgres_data:
