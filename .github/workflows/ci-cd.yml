name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: productse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: productse
          POSTGRES_USER: productse
          POSTGRES_PASSWORD: productse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U productse -d productse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://productse:productse@localhost:5432/productse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        run: >-
          pytest
          --cov=backend.app
          --cov-report=term-missing
          --cov-report=xml:backend/coverage.xml

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: error

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:coverage

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/frontend/dist
          if-no-files-found: error

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/frontend/coverage
          if-no-files-found: error

  deploy:
    name: Deploy production
    needs:
      - backend
      - frontend
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.VERCEL_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@50.28.0

      - name: Pull production environment
        run: >-
          vercel pull
          --yes
          --environment=production
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build deployable output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        id: deploy
        run: |
          DEPLOYMENT_URL="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
          echo "### Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${DEPLOYMENT_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test deployment
        run: >-
          curl
          --fail
          --silent
          --show-error
          --retry 10
          --retry-delay 5
          "${{ steps.deploy.outputs.url }}"
